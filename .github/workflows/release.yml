name: Release

# Runs when a version tag is pushed: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-installer:
    name: Build Windows installer
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create a GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      # Build the app — produces both NSIS (.exe) and WiX MSI (.msi) installers
      # under src-tauri/target/release/bundle/
      - name: Build Tauri app + installers
        run: cargo tauri build
        env:
          # Prevent Tauri from treating warnings as errors during release builds
          RUST_BACKTRACE: "1"

      # Publish a GitHub Release and attach both installers as release assets
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: GIRTool ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
